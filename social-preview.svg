<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="iconGlow" cx="256" cy="320" r="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#ff4444" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0d0d0d"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="320" rx="300" ry="280" fill="url(#iconGlow)"/>

  <!-- Top/bottom accents -->
  <rect x="0" y="0" width="1280" height="2" fill="#ff4444" opacity="0.5"/>
  <rect x="0" y="638" width="1280" height="2" fill="#ff4444" opacity="0.12"/>

  <!-- === LEFT: Shield + Lock icon === -->

  <!-- Shield outer shape -->
  <g filter="url(#glow)">
    <path d="M 256 180 L 370 220 L 370 340 Q 370 430 256 480 Q 142 430 142 340 L 142 220 Z" 
          fill="url(#shieldGrad)" stroke="#ff4444" stroke-width="2.5" opacity="0.9"/>
  </g>

  <!-- Shield inner outline -->
  <path d="M 256 205 L 348 238 L 348 338 Q 348 410 256 452 Q 164 410 164 338 L 164 238 Z" 
        fill="none" stroke="#ff4444" stroke-width="1" opacity="0.2"/>

  <!-- Shield middle divider -->
  <line x1="256" y1="220" x2="256" y2="460" stroke="#ff4444" stroke-width="0.8" opacity="0.15"/>
  <line x1="160" y1="330" x2="352" y2="330" stroke="#ff4444" stroke-width="0.8" opacity="0.15"/>

  <!-- Lock body -->
  <g filter="url(#bigGlow)">
    <rect x="226" y="310" width="60" height="48" rx="6" fill="#0d0d0d" stroke="#ff4444" stroke-width="2.5"/>
  </g>
  <!-- Lock shackle -->
  <path d="M 238 310 L 238 290 Q 238 268 256 268 Q 274 268 274 290 L 274 310" 
        fill="none" stroke="#ff4444" stroke-width="2.5"/>
  <!-- Keyhole -->
  <circle cx="256" cy="330" r="7" fill="#ff4444" opacity="0.6"/>
  <rect x="253" y="332" width="6" height="12" rx="2" fill="#ff4444" opacity="0.5"/>

  <!-- Warning hexagons scattered -->
  <g stroke="#ff4444" stroke-width="0.8" fill="none" opacity="0.15">
    <polygon points="100,240 112,234 124,240 124,252 112,258 100,252"/>
    <polygon points="380,260 392,254 404,260 404,272 392,278 380,272"/>
    <polygon points="120,420 132,414 144,420 144,432 132,438 120,432"/>
    <polygon points="370,410 382,404 394,410 394,422 382,428 370,422"/>
  </g>

  <!-- Scan lines emanating from shield -->
  <g stroke="#ff4444" stroke-width="0.5" opacity="0.12">
    <line x1="90" y1="320" x2="142" y2="320"/>
    <line x1="370" y1="320" x2="420" y2="320"/>
    <line x1="256" y1="140" x2="256" y2="180"/>
    <line x1="256" y1="480" x2="256" y2="520"/>
  </g>

  <!-- Small alert dots -->
  <g fill="#ff4444" opacity="0.35">
    <circle cx="108" cy="285" r="2"/>
    <circle cx="395" cy="305" r="2"/>
    <circle cx="135" cy="390" r="1.5"/>
    <circle cx="378" cy="385" r="1.5"/>
    <circle cx="200" cy="200" r="1.5"/>
    <circle cx="315" cy="195" r="2"/>
  </g>

  <!-- === RIGHT SIDE: Text === -->

  <!-- Tool name -->
  <text x="540" y="245" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="60" font-weight="700" fill="#ff4444" letter-spacing="-1">
    sentinel-inject
  </text>

  <!-- Underline accent -->
  <rect x="540" y="262" width="200" height="3" rx="1.5" fill="#ff4444" opacity="0.5"/>

  <!-- Tagline -->
  <text x="540" y="310" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif" font-size="24" fill="#cccccc" letter-spacing="0.5">
    Prompt injection defense for AI pipelines
  </text>

  <!-- Stats -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="15" fill="#666666">
    <circle cx="548" cy="380" r="3" fill="#ff4444" opacity="0.6"/>
    <text x="560" y="384">15 Detection Rules</text>
    <circle cx="548" cy="412" r="3" fill="#ff4444" opacity="0.6"/>
    <text x="560" y="416">LLM + Rule-Based</text>
    <circle cx="548" cy="444" r="3" fill="#ff4444" opacity="0.6"/>
    <text x="560" y="448">Audit Trail</text>
  </g>

  <!-- Separator -->
  <line x1="540" y1="490" x2="1100" y2="490" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Footer -->
  <text x="540" y="530" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" fill="#444444" letter-spacing="2">
    speed785.github.io
  </text>

  <!-- Corner decorations -->
  <g stroke="#ff4444" stroke-width="1" opacity="0.2">
    <path d="M 20 20 L 20 50"/>
    <path d="M 20 20 L 50 20"/>
    <path d="M 1260 20 L 1260 50"/>
    <path d="M 1260 20 L 1230 20"/>
    <path d="M 20 620 L 20 590"/>
    <path d="M 20 620 L 50 620"/>
    <path d="M 1260 620 L 1260 590"/>
    <path d="M 1260 620 L 1230 620"/>
  </g>

  <!-- Noise overlay -->
  <rect width="1280" height="640" filter="url(#noise)" opacity="0.5"/>
</svg>