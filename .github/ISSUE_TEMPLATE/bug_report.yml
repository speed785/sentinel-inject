name: Bug report
description: Report incorrect behavior or regressions
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue. For security vulnerabilities, do not use this form. Follow SECURITY.md.

  - type: input
    id: version
    attributes:
      label: Version
      description: Affected sentinel-inject version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - Python
        - TypeScript
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of actual behavior
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure scanner with ...
        2. Call scan on ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
